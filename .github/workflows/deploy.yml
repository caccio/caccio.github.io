name: Build & Deploy Jekyll

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permessi per il deploy su GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy alla volta; non cancella build in corso
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true   # esegue bundle install e mette in cache

      - name: Build
        run: bundle exec jekyll build --strict_front_matter
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        # carica _site/ come artefatto per il job deploy

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # deploy solo da main, non da PR
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
